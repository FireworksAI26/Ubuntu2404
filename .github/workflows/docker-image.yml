name: Build and Push RunPod Image

on:
  push:
    branches: [ "main", "master" ] # Runs on push to main or master

permissions:
  contents: read
  packages: write  # Crucial for pushing the image

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This creates the correct address for RunPod to find
          tags: ghcr.io/${{ github.repository_owner }}/runpod-desktop:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
